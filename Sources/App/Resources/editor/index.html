<!doctype html>
<!--
  Monaco host page. Loaded by CodeEditorView.swift via loadFileURL:. The
  AMD loader lives one directory up at ../monaco/vs/loader.js; everything
  is served off disk so there's no network round-trip and no CORS surface.

  Bridge:
    Swift  → JS   kiln.setText(text)
                   kiln.setLanguage(lang)
                   kiln.setEditable(bool)
                   kiln.setTheme('kiln-dark' | 'kiln-light')
    JS     → Swift  webkit.messageHandlers.kiln.postMessage({ kind, ... })
                     kind: 'ready'    — loader finished, editor is up
                     kind: 'change'   — { text } — user typed
                     kind: 'save'     — ⌘S pressed
-->
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body, #editor {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1e1e1e;
      }
      body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
  </head>
  <body>
    <div id="editor"></div>
    <script src="../monaco/vs/loader.js"></script>
    <script>
      // Loader can't talk to the file:// paths we're serving from without
      // this shim — it expects absolute URLs for worker construction.
      var baseUrl = new URL('../monaco/', document.baseURI).href;
      require.config({ paths: { vs: baseUrl + 'vs' } });

      // Workers don't work out of the box from file:// — route them through
      // a blob so Monaco still gets its language services off the main
      // thread without needing an HTTP server.
      self.MonacoEnvironment = {
        getWorkerUrl: function (_workerId, _label) {
          return 'data:text/javascript;charset=utf-8,' + encodeURIComponent(
            'self.MonacoEnvironment = { baseUrl: "' + baseUrl + '" };' +
            'importScripts("' + baseUrl + 'vs/base/worker/workerMain.js");'
          );
        }
      };

      function post(msg) {
        try { window.webkit.messageHandlers.kiln.postMessage(msg); } catch (_) {}
      }

      // Register a minimal Monarch tokenizer for a language Monaco doesn't
      // ship. Gets us keyword / string / comment / number coloring — not
      // full syntactic awareness, but enough that a Zig file reads as code
      // instead of a wall of identical foreground bytes. Each spec is:
      //   { id, keywords, types (optional), lineComment, blockComment,
      //     strings ('double' | 'both'), extra (optional: more rules prepended) }
      function registerBasic(spec) {
        monaco.languages.register({ id: spec.id, extensions: spec.extensions || [] });
        var stringRules = [];
        if (spec.strings === 'both' || spec.strings === 'single') {
          stringRules.push([/'([^'\\]|\\.)*'/, 'string']);
        }
        if (spec.strings !== 'single') {
          stringRules.push([/"([^"\\]|\\.)*"/, 'string']);
        }
        var commentRules = [];
        if (spec.blockComment) {
          // Default to /* */ unless the spec overrides.
          var open = spec.blockComment[0], close = spec.blockComment[1];
          commentRules.push(
            [new RegExp(open.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')), 'comment', '@blockComment']
          );
        }
        if (spec.lineComment) {
          var lc = spec.lineComment.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
          commentRules.push([new RegExp(lc + '.*$'), 'comment']);
        }
        monaco.languages.setMonarchTokensProvider(spec.id, {
          keywords: spec.keywords || [],
          typeKeywords: spec.types || [],
          operators: spec.operators || [
            '=', '>', '<', '!', '~', '?', ':', '==', '<=', '>=', '!=',
            '&&', '||', '++', '--', '+', '-', '*', '/', '&', '|', '^', '%',
            '<<', '>>', '+=', '-=', '*=', '/=', '&=', '|=', '^=', '%='
          ],
          symbols: /[=><!~?:&|+\-*\/\^%]+/,
          tokenizer: {
            root: [].concat(
              commentRules,
              [
                [/@?[a-zA-Z_][\w$]*/, {
                  cases: {
                    '@typeKeywords': 'type',
                    '@keywords': 'keyword',
                    '@default': 'identifier'
                  }
                }],
                [/\d+\.\d+([eE][\-+]?\d+)?/, 'number.float'],
                [/0[xX][0-9a-fA-F]+/, 'number.hex'],
                [/\d+/, 'number']
              ],
              stringRules,
              spec.extra || [],
              [
                [/[{}()\[\]]/, '@brackets'],
                [/[;,.]/, 'delimiter'],
                [/@symbols/, { cases: { '@operators': 'operator', '@default': '' } }]
              ]
            ),
            blockComment: [
              [/[^*\/]+/, 'comment'],
              [/\*\//, 'comment', '@pop'],
              [/./, 'comment']
            ]
          }
        });
        if (spec.config) {
          monaco.languages.setLanguageConfiguration(spec.id, spec.config);
        }
      }

      require(['vs/editor/editor.main'], function () {
        // Dark theme tuned to the Kiln palette (roughly matches the
        // sidebar/surface tokens in Theme.swift).
        // Kiln Dark — warm, low-saturation palette built around the app
        // accent (#ff7a45). Token rules push syntax into the earthy half
        // of the wheel (ember, clay, sand, moss) rather than the standard
        // VS Code blue/purple cool tones.
        //
        // Color roles (hex, no hash for Monaco's token rule syntax):
        //   ember  ff7a45   keywords, operators (the accent itself)
        //   flame  ff9d6d   strings
        //   sand   e8c39e   numbers, constants
        //   moss   a3b986   types, classes
        //   sage   7d9c7b   comments (mossier than the usual grey-green)
        //   clay   d89a6e   function names
        //   rust   c96a4a   regex, escapes, tag names
        //   slate  9a9a9a   identifiers, fallthrough
        //   dust   6a6a6a   punctuation, brackets
        monaco.editor.defineTheme('kiln-dark', {
          base: 'vs-dark',
          inherit: true,
          rules: [
            { token: '',                   foreground: 'e6e6e6' },
            { token: 'comment',            foreground: '7d9c7b', fontStyle: 'italic' },
            { token: 'comment.doc',        foreground: '8fae8d', fontStyle: 'italic' },
            { token: 'string',             foreground: 'ff9d6d' },
            { token: 'string.escape',      foreground: 'c96a4a' },
            { token: 'string.regexp',      foreground: 'c96a4a' },
            { token: 'number',             foreground: 'e8c39e' },
            { token: 'constant',           foreground: 'e8c39e' },
            { token: 'constant.numeric',   foreground: 'e8c39e' },
            { token: 'constant.language',  foreground: 'e8c39e' },
            { token: 'keyword',            foreground: 'ff7a45', fontStyle: 'bold' },
            { token: 'keyword.control',    foreground: 'ff7a45', fontStyle: 'bold' },
            { token: 'keyword.operator',   foreground: 'ff7a45' },
            { token: 'storage',            foreground: 'ff7a45' },
            { token: 'storage.type',       foreground: 'a3b986' },
            { token: 'storage.modifier',   foreground: 'ff7a45' },
            { token: 'type',               foreground: 'a3b986' },
            { token: 'type.identifier',    foreground: 'a3b986' },
            { token: 'entity.name.type',   foreground: 'a3b986' },
            { token: 'entity.name.class',  foreground: 'a3b986' },
            { token: 'entity.name.function', foreground: 'd89a6e' },
            { token: 'function',           foreground: 'd89a6e' },
            { token: 'variable',           foreground: 'e6e6e6' },
            { token: 'variable.parameter', foreground: 'e6e6e6', fontStyle: 'italic' },
            { token: 'identifier',         foreground: 'e6e6e6' },
            { token: 'delimiter',          foreground: '9a9a9a' },
            { token: 'delimiter.bracket',  foreground: '9a9a9a' },
            { token: 'delimiter.parenthesis', foreground: '9a9a9a' },
            { token: 'punctuation',        foreground: '6a6a6a' },
            { token: 'operator',           foreground: 'ff7a45' },
            // Language-specific niceties
            { token: 'tag',                foreground: 'c96a4a' },           // html/xml
            { token: 'tag.attribute',      foreground: 'd89a6e' },
            { token: 'attribute.name',     foreground: 'd89a6e' },
            { token: 'attribute.value',    foreground: 'ff9d6d' },
            { token: 'metatag',            foreground: 'c96a4a' },
            { token: 'key.json',           foreground: 'd89a6e' },
            { token: 'string.key.json',    foreground: 'd89a6e' },
            { token: 'string.value.json',  foreground: 'ff9d6d' },
            { token: 'variable.parameter.markdown', foreground: 'e8c39e' },
            { token: 'emphasis',           fontStyle: 'italic' },
            { token: 'strong',             fontStyle: 'bold' }
          ],
          colors: {
            'editor.background':              '#1a1a1a',
            'editor.foreground':              '#e6e6e6',
            'editorLineNumber.foreground':    '#3a3a3a',
            'editorLineNumber.activeForeground': '#ff7a45',
            'editor.selectionBackground':     '#ff7a4533',      // 20% accent
            'editor.inactiveSelectionBackground': '#3a3a3a',
            'editor.selectionHighlightBackground': '#ff7a4522',
            'editor.wordHighlightBackground': '#ff7a4522',
            'editor.wordHighlightStrongBackground': '#ff7a4544',
            'editor.findMatchBackground':     '#ff7a4555',
            'editor.findMatchHighlightBackground': '#ff7a4530',
            'editor.lineHighlightBackground': '#222222',
            'editor.lineHighlightBorder':     '#22222200',
            'editorCursor.foreground':        '#ff7a45',
            'editorWhitespace.foreground':    '#2a2a2a',
            'editorGutter.background':        '#1a1a1a',
            'editorGutter.modifiedBackground': '#ff7a45',
            'editorGutter.addedBackground':   '#a3b986',
            'editorGutter.deletedBackground': '#c96a4a',
            'editorIndentGuide.background':   '#262626',
            'editorIndentGuide.activeBackground': '#3a3a3a',
            'editorBracketMatch.background':  '#ff7a4522',
            'editorBracketMatch.border':      '#ff7a4588',
            'editorOverviewRuler.border':     '#1a1a1a',
            'editorWidget.background':        '#222222',
            'editorWidget.border':            '#3a3a3a',
            'editorSuggestWidget.background': '#222222',
            'editorSuggestWidget.border':     '#3a3a3a',
            'editorSuggestWidget.selectedBackground': '#ff7a4533',
            'editorSuggestWidget.highlightForeground': '#ff7a45',
            'editorHoverWidget.background':   '#222222',
            'editorHoverWidget.border':       '#3a3a3a',
            'scrollbarSlider.background':     '#3a3a3a55',
            'scrollbarSlider.hoverBackground':'#3a3a3a99',
            'scrollbarSlider.activeBackground':'#ff7a4588',
            'minimap.background':             '#1a1a1a',
            'minimap.selectionHighlight':     '#ff7a45',
            'editorError.foreground':         '#c96a4a',
            'editorWarning.foreground':       '#e8c39e',
            'editorInfo.foreground':          '#a3b986'
          }
        });
        // Kiln Light — same accent, brightened surfaces. Token rules mirror
        // the dark theme but pull each hue darker so contrast holds on white.
        monaco.editor.defineTheme('kiln-light', {
          base: 'vs',
          inherit: true,
          rules: [
            { token: '',                   foreground: '1a1a1a' },
            { token: 'comment',            foreground: '6a8a68', fontStyle: 'italic' },
            { token: 'string',             foreground: 'd65a1f' },
            { token: 'string.escape',      foreground: 'a84526' },
            { token: 'number',             foreground: 'b8862e' },
            { token: 'constant',           foreground: 'b8862e' },
            { token: 'keyword',            foreground: 'd65a1f', fontStyle: 'bold' },
            { token: 'keyword.operator',   foreground: 'd65a1f' },
            { token: 'storage',            foreground: 'd65a1f' },
            { token: 'type',               foreground: '5f7a44' },
            { token: 'entity.name.type',   foreground: '5f7a44' },
            { token: 'entity.name.function', foreground: 'a8651f' },
            { token: 'function',           foreground: 'a8651f' },
            { token: 'tag',                foreground: 'a84526' },
            { token: 'attribute.name',     foreground: 'a8651f' },
            { token: 'attribute.value',    foreground: 'd65a1f' }
          ],
          colors: {
            'editor.background':              '#ffffff',
            'editor.foreground':              '#1a1a1a',
            'editorLineNumber.foreground':    '#c0c0c0',
            'editorLineNumber.activeForeground': '#ff7a45',
            'editor.selectionBackground':     '#ff7a4533',
            'editor.lineHighlightBackground': '#faf6f2',
            'editorCursor.foreground':        '#ff7a45',
            'editorBracketMatch.background':  '#ff7a4522',
            'editorBracketMatch.border':      '#ff7a4588'
          }
        });

        // Extra languages Monaco doesn't ship with. Keyword lists are the
        // short canonical subsets — enough for keyword + string + number
        // coloring to make the file legible.
        registerBasic({
          id: 'zig', extensions: ['.zig'],
          lineComment: '//', strings: 'double',
          keywords: [
            'const','var','fn','pub','return','if','else','while','for','switch',
            'break','continue','defer','errdefer','try','catch','struct','enum',
            'union','error','test','comptime','inline','noinline','extern','export',
            'packed','align','volatile','threadlocal','anytype','anyerror','asm',
            'and','or','orelse','unreachable','undefined','null','true','false',
            'usingnamespace','suspend','resume','async','await','nosuspend','opaque'
          ],
          types: ['i8','i16','i32','i64','i128','isize','u8','u16','u32','u64','u128','usize','f16','f32','f64','f128','bool','void','type','anyopaque','c_int','c_uint','c_long','c_ulong']
        });
        registerBasic({
          id: 'nim', extensions: ['.nim','.nims'],
          lineComment: '#', strings: 'both',
          keywords: ['addr','and','as','asm','bind','block','break','case','cast','concept','const','continue','converter','defer','discard','distinct','div','do','elif','else','end','enum','except','export','finally','for','from','func','if','import','in','include','interface','is','isnot','iterator','let','macro','method','mixin','mod','nil','not','notin','object','of','or','out','proc','ptr','raise','ref','return','shl','shr','static','template','try','tuple','type','using','var','when','while','xor','yield'],
          types: ['int','int8','int16','int32','int64','uint','uint8','uint16','uint32','uint64','float','float32','float64','bool','char','string','cstring','seq','array','openArray','pointer','byte','set','Natural','Positive']
        });
        registerBasic({
          id: 'odin', extensions: ['.odin'],
          lineComment: '//', blockComment: ['/*','*/'], strings: 'double',
          keywords: ['package','import','foreign','using','proc','return','if','else','for','switch','case','break','continue','defer','when','where','in','not_in','struct','enum','union','bit_field','bit_set','map','dynamic','distinct','cast','transmute','auto_cast','const','do','fallthrough','or_else','or_return'],
          types: ['i8','i16','i32','i64','i128','int','u8','u16','u32','u64','u128','uint','uintptr','f16','f32','f64','bool','b8','b16','b32','b64','string','cstring','rune','byte','any','typeid','rawptr']
        });
        registerBasic({
          id: 'elm', extensions: ['.elm'],
          lineComment: '--', blockComment: ['{-','-}'], strings: 'double',
          keywords: ['module','where','import','as','exposing','type','alias','port','if','then','else','case','of','let','in','infix','infixl','infixr'],
          types: ['Int','Float','String','Char','Bool','List','Maybe','Result','Cmd','Sub','Html']
        });
        registerBasic({
          id: 'haskell', extensions: ['.hs','.lhs'],
          lineComment: '--', blockComment: ['{-','-}'], strings: 'double',
          keywords: ['case','class','data','default','deriving','do','else','forall','foreign','hiding','if','import','in','infix','infixl','infixr','instance','let','mdo','module','newtype','of','qualified','rec','then','type','where'],
          types: ['Int','Integer','Float','Double','Char','String','Bool','Maybe','Either','IO','Ordering','Word']
        });
        registerBasic({
          id: 'ocaml', extensions: ['.ml','.mli'],
          blockComment: ['(*','*)'], strings: 'double',
          keywords: ['and','as','assert','asr','begin','class','constraint','do','done','downto','else','end','exception','external','false','for','fun','function','functor','if','in','include','inherit','initializer','land','lazy','let','lor','lsl','lsr','lxor','match','method','mod','module','mutable','new','nonrec','object','of','open','or','private','rec','sig','struct','then','to','true','try','type','val','virtual','when','while','with'],
          types: ['int','float','char','string','bool','unit','list','array','option','ref','exn']
        });
        registerBasic({
          id: 'fortran', extensions: ['.f','.for','.f77','.f90','.f95','.f03','.f08'],
          lineComment: '!', strings: 'both',
          keywords: ['program','end','subroutine','function','module','use','contains','implicit','none','integer','real','double','precision','complex','logical','character','dimension','parameter','allocatable','allocate','deallocate','if','then','else','elseif','endif','do','while','enddo','select','case','default','continue','return','stop','exit','cycle','print','write','read','open','close','format','call','public','private','save','intrinsic','external','pure','elemental','recursive','interface','procedure','type','class','abstract','extends','generic'],
          types: ['integer','real','complex','logical','character','double']
        });
        registerBasic({
          id: 'nix', extensions: ['.nix'],
          lineComment: '#', blockComment: ['/*','*/'], strings: 'double',
          keywords: ['let','in','with','rec','if','then','else','inherit','assert','import','or','null','true','false'],
          types: []
        });
        registerBasic({
          id: 'makefile', extensions: ['.mk','.make'],
          lineComment: '#', strings: 'double',
          keywords: ['include','ifdef','ifndef','ifeq','ifneq','else','endif','define','endef','override','export','unexport','vpath','.PHONY','.SUFFIXES','.DEFAULT','.PRECIOUS','.INTERMEDIATE','.SECONDARY'],
          extra: [
            [/\$[({][\w-]+[)}]/, 'variable'],
            [/^[A-Za-z_][\w-]*\s*(?=:)/, 'entity.name.function']
          ]
        });
        registerBasic({
          id: 'cmake', extensions: ['.cmake'],
          lineComment: '#', strings: 'double',
          keywords: ['if','else','elseif','endif','foreach','endforeach','while','endwhile','function','endfunction','macro','endmacro','return','break','continue','include','set','unset','list','find_package','find_library','find_path','find_program','add_executable','add_library','add_subdirectory','target_link_libraries','target_include_directories','target_compile_definitions','target_compile_options','install','message','option','project','cmake_minimum_required','enable_language','enable_testing','add_test'],
          extra: [[/\$\{[^}]+\}/, 'variable']]
        });
        registerBasic({
          id: 'v', extensions: ['.v.lang'],  // careful: .v also used for Verilog; handled below
          lineComment: '//', blockComment: ['/*','*/'], strings: 'both',
          keywords: ['as','asm','assert','atomic','break','const','continue','defer','else','enum','fn','for','go','goto','if','import','in','interface','is','isreftype','lock','match','module','mut','none','or','pub','return','rlock','select','shared','sizeof','spawn','static','struct','thread','true','false','type','typeof','union','unsafe','volatile','__offsetof'],
          types: ['bool','string','int','i8','i16','i32','i64','i128','u8','u16','u32','u64','u128','f32','f64','byte','rune','voidptr','any','map','array']
        });
        registerBasic({
          id: 'gleam', extensions: ['.gleam'],
          lineComment: '//', strings: 'double',
          keywords: ['as','assert','case','const','external','fn','if','import','let','opaque','panic','pub','todo','type','use'],
          types: ['Int','Float','String','Bool','List','Result','Nil','BitArray']
        });
        registerBasic({
          id: 'crystal', extensions: ['.cr'],
          lineComment: '#', strings: 'both',
          keywords: ['abstract','alias','as','asm','begin','break','case','class','def','do','else','elsif','end','ensure','enum','extend','false','for','fun','if','in','include','instance_sizeof','is_a?','lib','macro','module','next','nil','of','out','pointerof','private','protected','require','rescue','responds_to?','return','select','self','sizeof','struct','super','then','true','type','typeof','uninitialized','union','unless','until','when','while','with','yield'],
          types: ['Int8','Int16','Int32','Int64','UInt8','UInt16','UInt32','UInt64','Float32','Float64','String','Bool','Nil','Array','Hash','Symbol','Proc','Char','Tuple','NamedTuple']
        });
        registerBasic({
          id: 'toml-ext', extensions: ['.toml'],
          lineComment: '#', strings: 'double',
          keywords: ['true','false'],
          extra: [[/^\s*\[[^\]]+\]/, 'type'], [/^\s*[A-Za-z_][\w-]*\s*(?==)/, 'key']]
        });

        // ------------------------------------------------------------------
        // The everything-under-the-sun batch. Monaco doesn't ship any of
        // these — each gets a minimal Monarch tokenizer so keywords, strings,
        // comments, and numbers color correctly. Grouped roughly by family.
        // ------------------------------------------------------------------

        // D — systems C-family
        registerBasic({
          id: 'd', extensions: ['.d','.di'],
          lineComment: '//', blockComment: ['/*','*/'], strings: 'both',
          keywords: ['abstract','alias','align','asm','assert','auto','body','bool','break','byte','case','cast','catch','cdouble','cent','cfloat','char','class','const','continue','creal','dchar','debug','default','delegate','delete','deprecated','do','double','else','enum','export','extern','false','final','finally','float','for','foreach','foreach_reverse','function','goto','idouble','if','ifloat','immutable','import','in','inout','int','interface','invariant','ireal','is','lazy','long','macro','mixin','module','new','nothrow','null','out','override','package','pragma','private','protected','public','pure','real','ref','return','scope','shared','short','static','struct','super','switch','synchronized','template','this','throw','true','try','typedef','typeid','typeof','ubyte','ucent','uint','ulong','union','unittest','ushort','version','void','volatile','wchar','while','with','__FILE__','__FUNCTION__','__LINE__','__MODULE__']
        });
        // Ada — strongly typed, verbose, begin/end blocks
        registerBasic({
          id: 'ada', extensions: ['.ada','.adb','.ads'],
          lineComment: '--', strings: 'double',
          keywords: ['abort','abs','abstract','accept','access','aliased','all','and','array','at','begin','body','case','constant','declare','delay','delta','digits','do','else','elsif','end','entry','exception','exit','for','function','generic','goto','if','in','interface','is','limited','loop','mod','new','not','null','of','or','others','out','overriding','package','pragma','private','procedure','protected','raise','range','record','rem','renames','requeue','return','reverse','select','separate','some','subtype','synchronized','tagged','task','terminate','then','type','until','use','when','while','with','xor'],
          types: ['Integer','Natural','Positive','Float','Long_Float','Character','String','Boolean','Duration','Wide_Character','Wide_String']
        });
        // COBOL — fixed-form identification/environment/data/procedure divisions
        registerBasic({
          id: 'cobol', extensions: ['.cob','.cbl','.cobol','.cpy'],
          lineComment: '*', strings: 'both',
          keywords: ['IDENTIFICATION','DIVISION','PROGRAM-ID','ENVIRONMENT','CONFIGURATION','SOURCE-COMPUTER','OBJECT-COMPUTER','INPUT-OUTPUT','FILE-CONTROL','DATA','FILE','WORKING-STORAGE','LINKAGE','SECTION','PROCEDURE','USING','SELECT','ASSIGN','ORGANIZATION','ACCESS','MODE','RECORD','KEY','FD','SD','COPY','REPLACING','OPEN','INPUT','OUTPUT','I-O','EXTEND','CLOSE','READ','WRITE','REWRITE','DELETE','START','ACCEPT','DISPLAY','MOVE','ADD','SUBTRACT','MULTIPLY','DIVIDE','COMPUTE','PERFORM','VARYING','UNTIL','TIMES','IF','THEN','ELSE','END-IF','EVALUATE','WHEN','END-EVALUATE','CALL','EXIT','STOP','RUN','GO','TO','SEARCH','SORT','MERGE','STRING','UNSTRING','INSPECT','REPLACE','OCCURS','PIC','PICTURE','VALUE','REDEFINES','RENAMES','BLANK','ZERO','ZEROS','ZEROES','SPACE','SPACES','HIGH-VALUE','LOW-VALUE','QUOTE','FILLER','USAGE','COMP','COMP-3','BINARY','PACKED-DECIMAL'],
          types: []
        });
        // Erlang — functional, pattern-matching, OTP
        registerBasic({
          id: 'erlang', extensions: ['.erl','.hrl'],
          lineComment: '%', strings: 'double',
          keywords: ['after','and','andalso','band','begin','bnot','bor','bsl','bsr','bxor','case','catch','cond','div','end','fun','if','let','not','of','or','orelse','receive','rem','try','when','xor','module','export','import','behaviour','compile','define','undef','ifdef','ifndef','include','include_lib','record','spec','type','callback','opaque','on_load'],
          types: ['atom','binary','bitstring','boolean','byte','char','float','function','integer','iolist','list','map','maybe_improper_list','neg_integer','nil','no_return','node','non_neg_integer','none','number','pid','port','pos_integer','reference','string','term','timeout','tuple']
        });
        // Prolog — Horn clauses, :- is the rule operator

        // Rebuild a theme whose accent-derived colors swap in at runtime.
        // Takes a hex without the leading '#'. Leaves non-accent token colors
        // (earthy palette) in place — just recolors everything tied to the
        // user's selected accent.
        function buildDarkThemeWithAccent(hex) {
          var a = (hex || 'ff7a45').replace('#', '').toLowerCase();
          return {
            base: 'vs-dark',
            inherit: true,
            rules: [
              { token: '',                   foreground: 'e6e6e6' },
              { token: 'comment',            foreground: '7d9c7b', fontStyle: 'italic' },
              { token: 'comment.doc',        foreground: '8fae8d', fontStyle: 'italic' },
              { token: 'string',             foreground: 'ff9d6d' },
              { token: 'string.escape',      foreground: 'c96a4a' },
              { token: 'string.regexp',      foreground: 'c96a4a' },
              { token: 'number',             foreground: 'e8c39e' },
              { token: 'constant',           foreground: 'e8c39e' },
              { token: 'keyword',            foreground: a, fontStyle: 'bold' },
              { token: 'keyword.control',    foreground: a, fontStyle: 'bold' },
              { token: 'keyword.operator',   foreground: a },
              { token: 'storage',            foreground: a },
              { token: 'storage.type',       foreground: 'a3b986' },
              { token: 'storage.modifier',   foreground: a },
              { token: 'type',               foreground: 'a3b986' },
              { token: 'type.identifier',    foreground: 'a3b986' },
              { token: 'entity.name.type',   foreground: 'a3b986' },
              { token: 'entity.name.class',  foreground: 'a3b986' },
              { token: 'entity.name.function', foreground: 'd89a6e' },
              { token: 'function',           foreground: 'd89a6e' },
              { token: 'variable',           foreground: 'e6e6e6' },
              { token: 'variable.parameter', foreground: 'e6e6e6', fontStyle: 'italic' },
              { token: 'identifier',         foreground: 'e6e6e6' },
              { token: 'delimiter',          foreground: '9a9a9a' },
              { token: 'punctuation',        foreground: '6a6a6a' },
              { token: 'operator',           foreground: a },
              { token: 'tag',                foreground: 'c96a4a' },
              { token: 'attribute.name',     foreground: 'd89a6e' },
              { token: 'attribute.value',    foreground: 'ff9d6d' }
            ],
            colors: {
              'editor.background':                    '#1a1a1a',
              'editor.foreground':                    '#e6e6e6',
              'editorLineNumber.foreground':          '#3a3a3a',
              'editorLineNumber.activeForeground':    '#' + a,
              'editor.selectionBackground':           '#' + a + '33',
              'editor.inactiveSelectionBackground':   '#3a3a3a',
              'editor.selectionHighlightBackground':  '#' + a + '22',
              'editor.wordHighlightBackground':       '#' + a + '22',
              'editor.wordHighlightStrongBackground': '#' + a + '44',
              'editor.findMatchBackground':           '#' + a + '55',
              'editor.findMatchHighlightBackground':  '#' + a + '30',
              'editor.lineHighlightBackground':       '#222222',
              'editorCursor.foreground':              '#' + a,
              'editorGutter.background':              '#1a1a1a',
              'editorGutter.modifiedBackground':      '#' + a,
              'editorBracketMatch.background':        '#' + a + '22',
              'editorBracketMatch.border':            '#' + a + '88',
              'editorSuggestWidget.selectedBackground': '#' + a + '33',
              'editorSuggestWidget.highlightForeground': '#' + a,
              'scrollbarSlider.activeBackground':     '#' + a + '88',
              'minimap.selectionHighlight':           '#' + a
            }
          };
        }

        function buildLightThemeWithAccent(hex) {
          var a = (hex || 'ff7a45').replace('#', '').toLowerCase();
          return {
            base: 'vs',
            inherit: true,
            rules: [
              { token: '',                   foreground: '1a1a1a' },
              { token: 'comment',            foreground: '6a8a68', fontStyle: 'italic' },
              { token: 'string',             foreground: 'd65a1f' },
              { token: 'number',             foreground: 'b8862e' },
              { token: 'keyword',            foreground: a, fontStyle: 'bold' },
              { token: 'keyword.operator',   foreground: a },
              { token: 'storage',            foreground: a },
              { token: 'type',               foreground: '5f7a44' },
              { token: 'entity.name.function', foreground: 'a8651f' },
              { token: 'function',           foreground: 'a8651f' }
            ],
            colors: {
              'editor.background':              '#ffffff',
              'editor.foreground':              '#1a1a1a',
              'editorLineNumber.foreground':    '#c0c0c0',
              'editorLineNumber.activeForeground': '#' + a,
              'editor.selectionBackground':     '#' + a + '33',
              'editor.lineHighlightBackground': '#faf6f2',
              'editorCursor.foreground':        '#' + a,
              'editorBracketMatch.background':  '#' + a + '22',
              'editorBracketMatch.border':      '#' + a + '88'
            }
          };
        }

        window.kiln = {
          setText: function (text) {
            if (editor.getValue() === text) return;
            suppressChange = true;
            editor.setValue(text);
            suppressChange = false;
          },
          setLanguage: function (lang) {
            var model = editor.getModel();
            if (model) monaco.editor.setModelLanguage(model, lang || 'plaintext');
          },
          setEditable: function (editable) {
            editor.updateOptions({ readOnly: !editable });
          },
          setTheme: function (name) {
            monaco.editor.setTheme(name || 'kiln-dark');
          },
          setAccent: function (hex) {
            monaco.editor.defineTheme('kiln-dark',  buildDarkThemeWithAccent(hex));
            monaco.editor.defineTheme('kiln-light', buildLightThemeWithAccent(hex));
            // defineTheme doesn't re-apply to the active editor — nudge it.
            monaco.editor.setTheme('kiln-dark');
          }
        };

        post({ kind: 'ready' });
      });
    </script>
  </body>
</html>
