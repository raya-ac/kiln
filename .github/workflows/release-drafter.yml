name: Release Drafter

# Runs on every push to main and on every PR. Keeps a draft release with
# up-to-date notes so hitting "publish" on a tag push is a one-click move.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write    # draft the release
      pull-requests: write  # apply autolabeler labels
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
